# SecCodeBench System Configuration
# This file contains system-level settings that control the behavior of the framework
# Users don't need to modify this file unless they have specific requirements

# Language requirements configuration
language_requirements:
  # Languages that require LLM judges for evaluation
  # When evaluating these languages, judge_llm_list must be provided
  # This is defined by testcases of each language
  languages_need_llm_judges:
    - java

# Score calculation weights configuration
score_weights:
  # Category weights: different severity levels have different weights
  # These weights are applied when calculating the final score
  category_weights:
    low: 1.0
    medium: 1.0
    high: 2.0
    critical: 4.0

  # Scenario weights: different test scenarios have different weights
  # Available scenarios: gen, gen-hints, fix, fix-hints
  scenario_weights:
    gen: 4.0
    gen-hints: 1.0
    fix: 4.0
    fix-hints: 1.0
